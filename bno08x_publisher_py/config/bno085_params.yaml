bno085_node:
  ros__parameters:
    # TF frame attached to the IMU
    frame_id: "imu_link"

    # Parent frame for the TF broadcast (set to your robot's base frame)
    parent_frame_id: "base_link"

    # Publishing rate in Hz (BNO085 supports up to ~400 Hz, 50 Hz is practical)
    publish_rate_hz: 50.0

    # I2C address: 0x4A (default, PS1 LOW) or 0x4B (PS1 HIGH)
    i2c_address: 75

    # Broadcast TF transform base_link → imu_link
    publish_tf: true
